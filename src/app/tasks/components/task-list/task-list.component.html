<div class="flex flex-col h-full">

  <!-- Header with always-visible "New task" button -->
  <div class="flex items-center justify-between px-4 py-3 border-b border-gray-200 dark:border-gray-700">
    <h1 class="text-lg font-semibold text-gray-900 dark:text-white">My tasks</h1>
    <button
      type="button"
      (click)="openCreateTaskDialog()"
      class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
      aria-label="Create new task"
    >
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
      </svg>
      New task
    </button>
  </div>

  <!-- Empty state -->
  <div
    *ngIf="tasks().length === 0"
    class="flex flex-col items-center justify-center flex-1 gap-4 py-16 text-center"
  >
    <svg class="w-12 h-12 text-gray-300 dark:text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
        d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
    </svg>
    <p class="text-sm text-gray-500 dark:text-gray-400">No tasks yet. Create your first task!</p>
    <button
      type="button"
      (click)="openCreateTaskDialog()"
      class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors"
    >
      New task
    </button>
  </div>

  <!-- Task list -->
  <ul *ngIf="tasks().length > 0" class="divide-y divide-gray-100 dark:divide-gray-700 overflow-y-auto flex-1">
    <li
      *ngFor="let task of tasks()"
      class="flex items-start gap-3 px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors"
    >
      <div class="flex-1 min-w-0">
        <p class="text-sm font-medium text-gray-900 dark:text-white truncate">{{ task.title }}</p>
        <p *ngIf="task.description" class="text-xs text-gray-500 dark:text-gray-400 mt-0.5 truncate">
          {{ task.description }}
        </p>
        <div class="flex items-center gap-2 mt-1">
          <span
            *ngIf="task.deadline"
            class="text-xs text-gray-400 dark:text-gray-500"
          >{{ task.deadline }}</span>
          <span
            class="inline-flex items-center px-1.5 py-0.5 rounded text-xs font-medium"
            [class.bg-red-100]="task.priority === 'high'"
            [class.text-red-700]="task.priority === 'high'"
            [class.bg-yellow-100]="task.priority === 'medium'"
            [class.text-yellow-700]="task.priority === 'medium'"
            [class.bg-gray-100]="task.priority === 'low'"
            [class.text-gray-600]="task.priority === 'low'"
          >{{ task.priority }}</span>
          <span
            *ngIf="task.syncStatus === 'pending'"
            class="text-xs text-orange-400"
            title="Pending sync"
          >offline</span>
        </div>
      </div>
    </li>
  </ul>

</div>
