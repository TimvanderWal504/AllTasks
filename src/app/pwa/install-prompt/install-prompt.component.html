@if (isPromptAvailable()) {
  <div class="fixed bottom-0 inset-x-0 z-50 flex justify-center px-4 pb-4">
    <div class="bg-blue-600 dark:bg-blue-700 text-white rounded-xl shadow-xl px-4 py-3 flex items-center gap-3 max-w-sm w-full">
      <span class="flex-1 text-sm font-medium">Install this app for a better experience</span>
      <button
        type="button"
        class="bg-white dark:bg-gray-100 text-blue-600 dark:text-blue-700 hover:bg-blue-50 dark:hover:bg-gray-200 text-sm font-medium px-3 py-1.5 rounded-lg"
        (click)="installApp()"
      >
        Install
      </button>
    </div>
  </div>
}
